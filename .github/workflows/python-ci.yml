name: Python CI & Docker Build

on:
  push:
    branches:
      - master
      - lab03
  pull_request:
    branches:
      - master
      - lab03

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app_python/requirements.txt
          pip install -r app_python/requirements-dev.txt
          pip install ruff

      - name: Run linter (ruff)
        run: python -m ruff check app_python

      - name: Run tests
        run: pytest app_python/tests -v --disable-warnings
      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: app_python --file=requirements.txt --severity-threshold=high --skip-unresolved


  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set Docker tags
        run: |
          VERSION=$(date +%Y.%m.%d)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "IMAGE_TAGS=$VERSION,latest" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./app_python
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/python-service:${{ env.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/python-service:latest
