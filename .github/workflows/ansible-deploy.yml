name: Ansible Deployment

on:
  push:
    branches: [main, master]
    paths:
      - 'ansible/**'
      - '!ansible/docs/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'ansible/**'
      - '!ansible/docs/**'

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and ansible-lint
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint
          ansible-galaxy collection install community.docker
          ansible-galaxy collection install community.general

      - name: Create vault password file
        run: |
          printf '%s\n' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/.vault_pass
          chmod 600 ansible/.vault_pass

      - name: Run ansible-lint
        run: |
          cd ansible
          ansible-lint playbooks/*.yml roles/*

  deploy:
    name: Deploy application
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install community.docker
          ansible-galaxy collection install community.general

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Create inventory file
        run: |
          cat > ansible/inventory/hosts.ini <<EOF
          [webservers]
          my-vm ansible_host=${{ secrets.VM_HOST }} ansible_user=${{ secrets.VM_USER }}
          EOF

      - name: Create vault password file
        run: |
          printf '%s\n' "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/.vault_pass
          chmod 600 ansible/.vault_pass

      - name: Deploy with Ansible
        run: |
          cd ansible
          ansible-playbook playbooks/deploy.yml

      - name: Verify application
        run: |
          sleep 10
          curl -f "http://${{ secrets.VM_HOST }}:5000/"
          curl -f "http://${{ secrets.VM_HOST }}:5000/health"
