---
- name: Docker | installation tasks
  become: true
  tags:
    - docker
    - docker_install
  block:
    - name: Docker | install prerequisite packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Docker | create apt keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Docker | add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: true

    - name: Docker | add Docker repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Docker | update apt cache after repository setup
      ansible.builtin.apt:
        update_cache: true

    - name: Docker | install Docker packages
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - python3-pip
        state: present
      notify: restart docker

    - name: Docker | install Docker Python SDK
      ansible.builtin.apt:
        name: python3-docker
        state: present

  rescue:
    - name: Docker | wait before retry
      ansible.builtin.pause:
        seconds: 10

    - name: Docker | retry apt cache update
      ansible.builtin.apt:
        update_cache: true

    - name: Docker | retry Docker package install
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
          - python3-pip
        state: present

  always:
    - name: Docker | ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

- name: Docker | configuration tasks
  become: true
  tags:
    - docker
    - docker_config
  block:
    - name: Docker | add user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true
