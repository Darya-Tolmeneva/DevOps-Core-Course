---
- name: App deploy | include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - app_deploy_wipe

- name: App deploy | deploy application with Docker Compose
  become: true
  tags:
    - app_deploy
    - compose
  block:
    - name: App deploy | log in to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_token }}"
      no_log: false

    - name: App deploy | create application directory
      ansible.builtin.file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: App deploy | template docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: App deploy | deploy compose project
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always

    - name: App deploy | wait for application port
      ansible.builtin.wait_for:
        host: "127.0.0.1"
        port: "{{ app_port }}"
        delay: 3
        timeout: 60

    - name: App deploy | verify health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ app_port }}/health"
        method: GET
        status_code: 200
      register: healthcheck
      retries: 5
      delay: 5
      until: healthcheck.status == 200

  rescue:
    - name: App deploy | deployment failed
      ansible.builtin.debug:
        msg: "Deployment failed for {{ app_name }}"

  always:
    - name: App deploy | show compose project directory
      ansible.builtin.debug:
        msg: "Compose project directory: {{ compose_project_dir }}"
