---
- name: App deploy | wipe application
  become: true
  when: app_deploy_wipe | bool
  tags:
    - app_deploy_wipe
  block:
    - name: App deploy | stop and remove compose project
      community.docker.docker_compose_v2:
        project_src: "{{ app_deploy_compose_project_dir }}"
        state: absent
      register: app_deploy_compose_wipe_result
      failed_when: false

    - name: App deploy | remove docker-compose file
      ansible.builtin.file:
        path: "{{ app_deploy_compose_project_dir }}/docker-compose.yml"
        state: absent

    - name: App deploy | remove application directory
      ansible.builtin.file:
        path: "{{ app_deploy_compose_project_dir }}"
        state: absent

    - name: App deploy | wipe completed
      ansible.builtin.debug:
        msg: "Application {{ app_name }} wiped successfully"
