apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-app-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Darya-Tolmeneva/DevOps-Core-Course
    targetRevision: master
    path: k8s/devops-info
    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
