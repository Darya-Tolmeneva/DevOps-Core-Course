replicaCount: 5

image:
  repository: din19pg/python-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

service:
  type: LoadBalancer
  port: 80
  targetPort: 5000

livenessProbe:
  initialDelaySeconds: 30
  periodSeconds: 5

readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 3

app:
  environment: prod
  logLevel: INFO
  dataDir: /data

persistence:
  enabled: true
  size: 200Mi
  storageClass: ""

secret:
  create: false
  name: devops-info-secret