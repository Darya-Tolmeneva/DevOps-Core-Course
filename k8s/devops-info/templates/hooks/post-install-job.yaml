apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-info.fullname" . }}-post-install"
  labels:
    {{- include "devops-info.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": ""
spec:
  template:
    metadata:
      name: "{{ include "devops-info.fullname" . }}-post-install"
    spec:
      restartPolicy: Never
      containers:
        - name: post-install-job
          image: busybox
          command: ['sh', '-c', 'echo Post-install validation && sleep 5 && echo Validation passed']
